[package]
name = "prudent"

# On version change, also update src/backend.rs -> assert_version.
version = "0.0.3-delta"

edition = "2021"
# Requiring Rust Edition 2021 and Rust 1.71.0 (as of April 2026). Why? Because `prudent` depends
# (even though only optionally) on `prudent-macros-lint`, which requires that.
#
# If you increase rust-version, update .github/workflows/main.yml.
#
# Tests require Rust 1.89+. See .github/workflows/main.yml.
rust-version = "1.71.0"


license = "BSD-2-Clause OR Apache-2.0 OR MIT"

authors = ["Peter Lyons Kehl<peter.kehl@gmail.com>"]
description = "Help you make Rust code safer. For both authors and reviewers."

categories = ["development-tools", "no-std", "no-std::no-alloc", "rust-patterns", "security"]

keywords = ["safe", "safety", "unsafe", "isolation", "review"]

repository = "https://github.com/prudent-rs/prudent"
homepage = "https://github.com/prudent-rs/prudent"

# "lints" key is supported only since Rust 1.74.0 (November 2023). But we include this even though
# our rust-version/MSRV is 1.71.0.
[lints.rust]
unexpected_cfgs = { level = "forbid"}
unknown_lints = { level = "forbid"}

[features]
# UNSTABLE Check that the method actually is unsafe. This requires nightly Rust version until
# https://github.com/rust-lang/rust/issues/88531 is implemented. Subject to CHANGE.
#
# If you enable this
# - and use `nightly` compiler
# - either
#   - have `#![feature(type_alias_impl_trait)]` at the top of your crate (normally your
#     `src/lib.rs`, `src/main.rs` or `src/bin/*.rs`), or
#   - use it in rustdocs with injection - TODO check:
#     ```
#     // at the top of your crate:
#     #![doc(test(attr = ::prudent::top_header_assert_unsafe_methods!()))]
#     ```
#     - if you enable it conditionally, and if your feature is also called `assert_unsafe_methods`,
#       have:
#       ```
#       #![cfg_attr(feature = "assert_unsafe_methods", doc(test(attr = ::prudent::top_header_assert_unsafe_methods!())))]
#       ```
# Use feature "lint_unused_unsafe" in debug mode (`debug_assertions`) ONLY. Otherwise it fails -
# intentionally.
#
# AND: feature "lint_unused_unsafe" takes LONG to build, because it has to use procedural macros.
lint_unused_unsafe = ["prudent-macros-lint"]

[dependencies]
# We COULD use default-features of `prudent-macros-enforce`, which is just the reverse version
# compatibility check done/initiated by prudent-macros-enforce itself; but we don't need to, because
# we request and accept only an exact version of prudent-macros-enforce with "= ..." version
# specifier.
#
# prudent-macros-enforce is NOT used when you enable feature "lint_unused_unsafe". But it is NOT
# optional - it IS required anyway. Doing it the other way (mutually excluding
# prudent-macros-enforce and prudent-macros-lint) would be difficult and confusing:
#
# There is no way to conditionally "DISABLE" (or "not enable") a feature in Cargo.toml based on
# `cfg(debug_assertions)`, see
# https://doc.rust-lang.org/nightly/cargo/reference/specifying-dependencies.html#platform-specific-dependencies.
#
# So, the only way to conditionally **exclude** prudent-macros-enforce somehow in Cargo.toml
# (without having "build.rs") would be to include it in default-features, and instructing them to
# disable default-features. But then any 3rd party that uses prudent could re-add it simply by
# forgetting to opt out of default-features.
prudent-macros-enforce = {path="../prudent-macros-enforce", version="= 0.0.3-delta", default-features = false }
#
prudent-macros-lint = {path="../prudent-macros-lint", version="= 0.0.3-delta", optional = true }
